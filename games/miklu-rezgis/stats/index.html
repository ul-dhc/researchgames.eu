<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071225">
  <meta name="robots" content="noindex, nofollow">
  <title>Mīklu režģis – pētniecības dati</title>
  <link rel="icon" href="../assets/miklu-rezgis-mark.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #071225;
      color: #f2f6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #071225;
    }

    .dashboard-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #071225;
    }

    .fallback {
      position: fixed;
      inset: auto 1rem 1rem;
      z-index: -1;
      margin: 0;
      color: #9eacc5;
      text-align: center;
    }

    .fallback a {
      color: #46d9ba;
      text-decoration: none;
    }

    .fallback a:hover,
    .fallback a:focus-visible {
      color: #20b895;
    }
  </style>
</head>
<body>
  <iframe
    class="dashboard-frame"
    title="Mīklu režģa pētniecības dati"
    src="https://script.google.com/macros/s/AKfycbwzomHmovON2lQiPP2xa40FRCDFXJ38ofD8YDKB63SBrQHBMB2HKaCBDM_bBmgXsLkD/exec"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
  <p class="fallback">
    Ja dashboardu neizdodas atvērt,
    <a href="https://script.google.com/macros/s/AKfycbwzomHmovON2lQiPP2xa40FRCDFXJ38ofD8YDKB63SBrQHBMB2HKaCBDM_bBmgXsLkD/exec">
      atver to jaunā logā ↗
    </a>
  </p>
</body>
</html>
